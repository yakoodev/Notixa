services:
  telegram-notifications:
    build:
      context: .
      dockerfile: TelegramNotifications.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      TelegramBot__BotToken: "${TELEGRAM_BOT_TOKEN:-}"
      TelegramBot__BotUsername: "${TELEGRAM_BOT_USERNAME:-}"
      TelegramBot__UpdateMode: "${TELEGRAM_UPDATE_MODE:-LongPolling}"
      TelegramBot__WebhookBaseUrl: "${TELEGRAM_WEBHOOK_BASE_URL:-}"
      Security__SuperAdminTelegramUserId: "${SUPER_ADMIN_TELEGRAM_USER_ID:-0}"
      Storage__ConnectionString: "Data Source=/app/app_data/telegram-notifications.db"
    volumes:
      - telegram_notifications_data:/app/app_data

volumes:
  telegram_notifications_data:
